<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ticketeer - Scanner un Billet</title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
    <style>
        .scan-page {
            min-height: 100vh;
            background: linear-gradient(160deg, #0a0a1a 0%, #1a1a3e 40%, #0d1b2a 100%);
        }
        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 40px;
            background: rgba(255,255,255,0.04);
            border-bottom: 1px solid rgba(255,255,255,0.06);
            backdrop-filter: blur(10px);
        }
        .topbar-brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .topbar-brand .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .topbar-brand h2 {
            color: #f1f5f9;
            font-size: 20px;
            font-weight: 700;
            margin: 0;
        }
        .topbar-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .topbar-right .user-name {
            color: #94a3b8;
            font-size: 14px;
        }
        .topbar-right .user-name strong {
            color: #e2e8f0;
        }
        .btn-back {
            padding: 8px 20px;
            background: rgba(100, 116, 139, 0.2);
            border: 1px solid rgba(100, 116, 139, 0.3);
            border-radius: 8px;
            color: #94a3b8;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .btn-back:hover {
            background: rgba(100, 116, 139, 0.3);
            color: #cbd5e1;
        }
        .scan-content {
            max-width: 700px;
            margin: 0 auto;
            padding: 50px 24px;
        }
        .service-banner {
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.12), rgba(139, 92, 246, 0.12));
            border: 1px solid rgba(59, 130, 246, 0.2);
            border-radius: 16px;
            padding: 24px 28px;
            margin-bottom: 36px;
            animation: fadeDown 0.5s ease-out;
        }
        @keyframes fadeDown {
            0% { opacity: 0; transform: translateY(-10px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        .service-banner .label {
            color: #64748b;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
            margin-bottom: 8px;
        }
        .service-banner .service-name {
            color: #e2e8f0;
            font-size: 18px;
            font-weight: 600;
        }
        .scan-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 20px;
            padding: 40px;
            animation: fadeUp 0.6s ease-out 0.15s both;
        }
        @keyframes fadeUp {
            0% { opacity: 0; transform: translateY(15px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        .scan-card h2 {
            color: #f1f5f9;
            font-size: 22px;
            font-weight: 700;
            margin: 0 0 8px;
        }
        .scan-card .subtitle {
            color: #64748b;
            font-size: 14px;
            margin-bottom: 32px;
        }
        .scan-icon {
            text-align: center;
            margin-bottom: 28px;
        }
        .scan-icon .icon-circle {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.15), rgba(139, 92, 246, 0.15));
            border: 2px solid rgba(59, 130, 246, 0.25);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto;
            animation: pulse 2.5s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.2); }
            50% { box-shadow: 0 0 0 15px rgba(59, 130, 246, 0); }
        }
        .form-group {
            margin-bottom: 24px;
        }
        .form-group label {
            display: block;
            color: #cbd5e1;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .form-group input {
            width: 100%;
            padding: 16px 18px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: #f1f5f9;
            font-size: 18px;
            font-family: 'Courier New', monospace;
            letter-spacing: 2px;
            transition: all 0.3s ease;
            outline: none;
            text-align: center;
            box-sizing: border-box;
        }
        .form-group select {
            width: 100%;
            padding: 16px 18px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: #f1f5f9;
            font-size: 16px;
            transition: all 0.3s ease;
            outline: none;
            box-sizing: border-box;
        }
        .form-group input:focus {
            border-color: #3b82f6;
            background: rgba(59, 130, 246, 0.08);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
        }
        .form-group select:focus {
            border-color: #3b82f6;
            background: rgba(59, 130, 246, 0.08);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
        }
        .form-group input::placeholder {
            color: #475569;
            letter-spacing: 1px;
            font-size: 15px;
        }
        .btn-validate {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .btn-validate:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(59, 130, 246, 0.4);
        }
        .btn-validate:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        .btn-validate .spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .btn-validate.loading .spinner {
            display: block;
        }
        .btn-validate.loading .btn-text {
            display: none;
        }

        /* Result overlay */
        .result-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .result-overlay.active {
            display: flex;
            animation: overlayIn 0.3s ease-out;
        }
        @keyframes overlayIn {
            0% { opacity: 0; }
            100% { opacity: 1; }
        }
        .result-card {
            background: #1e1e3a;
            border-radius: 24px;
            padding: 40px;
            width: 90%;
            max-width: 480px;
            text-align: center;
            animation: resultPop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
        }
        @keyframes resultPop {
            0% { opacity: 0; transform: scale(0.8) translateY(20px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }
        .result-icon {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
        }
        .result-icon.valid {
            background: linear-gradient(135deg, rgba(34, 197, 94, 0.2), rgba(16, 185, 129, 0.2));
            border: 3px solid rgba(34, 197, 94, 0.4);
            animation: successPulse 1.5s ease-in-out infinite;
        }
        @keyframes successPulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.3); }
            50% { box-shadow: 0 0 0 12px rgba(34, 197, 94, 0); }
        }
        .result-icon.invalid {
            background: linear-gradient(135deg, rgba(239, 68, 68, 0.2), rgba(220, 38, 38, 0.2));
            border: 3px solid rgba(239, 68, 68, 0.4);
            animation: errorShake 0.5s ease-in-out;
        }
        @keyframes errorShake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-8px); }
            40% { transform: translateX(8px); }
            60% { transform: translateX(-5px); }
            80% { transform: translateX(5px); }
        }
        .result-status {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 6px;
        }
        .result-status.valid { color: #4ade80; }
        .result-status.invalid { color: #f87171; }
        .result-motif {
            color: #94a3b8;
            font-size: 14px;
            margin-bottom: 24px;
        }
        .result-client {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: left;
        }
        .result-client .client-header {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 12px;
        }
        .client-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            font-size: 18px;
            flex-shrink: 0;
        }
        .client-name {
            color: #e2e8f0;
            font-size: 16px;
            font-weight: 600;
        }
        .result-service-info {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 16px 20px;
            margin-bottom: 24px;
            text-align: left;
        }
        .result-service-info .info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 0;
            color: #94a3b8;
            font-size: 13px;
        }
        .result-service-info .info-row .info-value {
            color: #e2e8f0;
            font-weight: 600;
        }
        .btn-new-scan {
            width: 100%;
            padding: 14px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 12px;
            color: #e2e8f0;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .btn-new-scan:hover {
            background: rgba(255,255,255,0.15);
        }
    </style>
</head>
<body>
<div class="scan-page">
    <div class="topbar">
        <div class="topbar-brand">
            <div class="logo-icon">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
                    <rect x="4" y="3" width="16" height="18" rx="2"/>
                    <line x1="4" y1="9" x2="20" y2="9"/>
                    <line x1="4" y1="15" x2="20" y2="15"/>
                    <line x1="10" y1="3" x2="10" y2="9"/>
                </svg>
            </div>
            <h2>Ticketeer</h2>
        </div>
        <div class="topbar-right">
            <span class="user-name">Controleur : <strong th:text="${controleurNom}">Nom</strong></span>
            <a th:href="@{/controleur/home}" class="btn-back">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="15,18 9,12 15,6"/>
                </svg>
                Retour
            </a>
        </div>
    </div>

    <div class="scan-content">
        <div class="service-banner">
            <div class="label">Service en cours de controle</div>
            <div class="service-name" th:text="${serviceLabel}">TGV100 - Paris vers Lyon (2025-06-15)</div>
        </div>

        <div class="scan-card">
            <div class="scan-icon">
                <div class="icon-circle">
                    <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#60a5fa" stroke-width="2">
                        <path d="M3 7V5a2 2 0 0 1 2-2h2"/>
                        <path d="M17 3h2a2 2 0 0 1 2 2v2"/>
                        <path d="M21 17v2a2 2 0 0 1-2 2h-2"/>
                        <path d="M7 21H5a2 2 0 0 1-2-2v-2"/>
                        <line x1="7" y1="8" x2="7" y2="16"/>
                        <line x1="10" y1="8" x2="10" y2="16"/>
                        <line x1="13" y1="8" x2="13" y2="16"/>
                        <line x1="16" y1="8" x2="16" y2="16"/>
                    </svg>
                </div>
            </div>
            <h2>Scanner un billet</h2>
            <p class="subtitle">Scannez ou saisissez le code optique du billet voyageur</p>

            <div class="form-group">
                <label for="checkpointId">Checkpoint actuel</label>
                <select id="checkpointId">
                    <option value="">Selectionnez la gare de controle</option>
                    <option th:each="checkpoint : ${checkpoints}"
                            th:value="${checkpoint.checkpointId}"
                            th:text="${checkpoint.ordre + '. ' + checkpoint.ville.nom}">1. Paris</option>
                </select>
            </div>

            <div class="form-group">
                <label for="codeOptique">Code optique</label>
                <input type="text" id="codeOptique" placeholder="Ex: BILLET-001-ABC" autofocus>
            </div>

            <input type="hidden" id="serviceId" th:value="${service.serviceId}">

            <button type="button" id="btnValidate" class="btn-validate" onclick="validerBillet()">
                <span class="btn-text">Valider le billet</span>
                <span class="spinner"></span>
            </button>
        </div>
    </div>

    <!-- Result overlay -->
    <div id="resultOverlay" class="result-overlay">
        <div class="result-card">
            <div id="resultIcon" class="result-icon">
                <svg id="iconValid" width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="#4ade80" stroke-width="3" style="display:none">
                    <polyline points="20 6 9 17 4 12"/>
                </svg>
                <svg id="iconInvalid" width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="#f87171" stroke-width="3" style="display:none">
                    <line x1="18" y1="6" x2="6" y2="18"/>
                    <line x1="6" y1="6" x2="18" y2="18"/>
                </svg>
            </div>
            <div id="resultStatus" class="result-status"></div>
            <div id="resultMotif" class="result-motif"></div>

            <div id="clientSection" class="result-client" style="display:none">
                <div class="client-header">
                    <div id="clientAvatar" class="client-avatar"></div>
                    <div id="clientName" class="client-name"></div>
                </div>
            </div>

            <div id="serviceSection" class="result-service-info" style="display:none">
                <div class="info-row">
                    <span>Train</span>
                    <span id="resTrain" class="info-value"></span>
                </div>
                <div class="info-row">
                    <span>Trajet</span>
                    <span id="resTrajet" class="info-value"></span>
                </div>
                <div class="info-row">
                    <span>Date</span>
                    <span id="resDate" class="info-value"></span>
                </div>
                <div class="info-row">
                    <span>Checkpoint</span>
                    <span id="resCheckpoint" class="info-value"></span>
                </div>
                <div class="info-row">
                    <span>Zone valide</span>
                    <span id="resValidity" class="info-value"></span>
                </div>
            </div>

            <button class="btn-new-scan" onclick="nouveauScan()">Scanner un autre billet</button>
        </div>
    </div>
</div>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
