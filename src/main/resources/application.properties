spring.application.name=ticketeer

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/mydatabase?createDatabaseIfNotExist=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:user}
spring.datasource.password=${DB_PASSWORD:password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false
spring.jpa.defer-datasource-initialization=true

spring.sql.init.mode=never

server.port=${SERVER_PORT:8080}
app.qr-signing-secret=${QR_SIGNING_SECRET:change-this-secret-in-production}
app.mobile-auth-token-secret=${MOBILE_AUTH_TOKEN_SECRET:${app.qr-signing-secret}}
app.mobile-auth-token-ttl-hours=${MOBILE_AUTH_TOKEN_TTL_HOURS:168}
app.mobile-login-rate-limit-max-failures=${MOBILE_LOGIN_RATE_LIMIT_MAX_FAILURES:5}
app.mobile-login-rate-limit-block-minutes=${MOBILE_LOGIN_RATE_LIMIT_BLOCK_MINUTES:15}
app.controller-validation-rate-limit-max-attempts=${CONTROLLER_VALIDATION_RATE_LIMIT_MAX_ATTEMPTS:20}
app.controller-validation-rate-limit-window-seconds=${CONTROLLER_VALIDATION_RATE_LIMIT_WINDOW_SECONDS:60}











