<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ticketeer - Connexion Controleur</title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
    <style>
        .login-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            position: relative;
            overflow: hidden;
        }
        .login-page::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(ellipse at 30% 20%, rgba(59, 130, 246, 0.15) 0%, transparent 50%),
                        radial-gradient(ellipse at 70% 80%, rgba(147, 51, 234, 0.12) 0%, transparent 50%);
            animation: bgShift 15s ease-in-out infinite alternate;
        }
        @keyframes bgShift {
            0% { transform: translate(0, 0) rotate(0deg); }
            100% { transform: translate(-5%, 3%) rotate(3deg); }
        }
        .train-animation {
            position: absolute;
            bottom: 60px;
            left: -300px;
            width: 300px;
            height: 40px;
            animation: trainMove 12s linear infinite;
            opacity: 0.15;
            z-index: 0;
        }
        .train-body {
            width: 200px;
            height: 30px;
            background: linear-gradient(90deg, #60a5fa, #818cf8);
            border-radius: 5px 15px 5px 5px;
            position: absolute;
            bottom: 5px;
            right: 0;
        }
        .train-head {
            width: 60px;
            height: 25px;
            background: linear-gradient(90deg, #818cf8, #a78bfa);
            border-radius: 3px 20px 5px 3px;
            position: absolute;
            bottom: 7px;
            right: 200px;
        }
        .train-wheel {
            width: 12px;
            height: 12px;
            background: #e2e8f0;
            border-radius: 50%;
            position: absolute;
            bottom: 0;
        }
        .train-wheel:nth-child(3) { right: 20px; }
        .train-wheel:nth-child(4) { right: 60px; }
        .train-wheel:nth-child(5) { right: 140px; }
        .train-wheel:nth-child(6) { right: 180px; }
        .train-track {
            position: absolute;
            bottom: 55px;
            left: 0;
            width: 100%;
            height: 3px;
            background: repeating-linear-gradient(90deg, rgba(148,163,184,0.2) 0px, rgba(148,163,184,0.2) 20px, transparent 20px, transparent 35px);
            z-index: 0;
        }
        @keyframes trainMove {
            0% { left: -300px; }
            100% { left: 110%; }
        }
        .login-card {
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 24px;
            padding: 48px 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.4);
            position: relative;
            z-index: 1;
            animation: cardAppear 0.8s ease-out;
        }
        @keyframes cardAppear {
            0% { opacity: 0; transform: translateY(30px) scale(0.95); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }
        .login-logo {
            text-align: center;
            margin-bottom: 32px;
        }
        .login-logo .icon {
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
            font-size: 32px;
            box-shadow: 0 8px 25px rgba(59, 130, 246, 0.35);
        }
        .login-logo h1 {
            color: #f1f5f9;
            font-size: 26px;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin: 0;
        }
        .login-logo p {
            color: #94a3b8;
            font-size: 14px;
            margin-top: 6px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            color: #cbd5e1;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .form-group input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: #f1f5f9;
            font-size: 15px;
            transition: all 0.3s ease;
            outline: none;
            box-sizing: border-box;
        }
        .form-group input:focus {
            border-color: #3b82f6;
            background: rgba(59, 130, 246, 0.08);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
        }
        .form-group input::placeholder {
            color: #64748b;
        }
        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 8px;
            position: relative;
            overflow: hidden;
        }
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(59, 130, 246, 0.4);
        }
        .btn-login:active {
            transform: translateY(0);
        }
        .alert {
            padding: 12px 16px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 14px;
            animation: alertIn 0.4s ease-out;
        }
        @keyframes alertIn {
            0% { opacity: 0; transform: translateY(-10px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        .alert-error {
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #fca5a5;
        }
        .alert-success {
            background: rgba(34, 197, 94, 0.15);
            border: 1px solid rgba(34, 197, 94, 0.3);
            color: #86efac;
        }
        .particles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 0;
        }
        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(139, 92, 246, 0.3);
            border-radius: 50%;
            animation: float 8s infinite ease-in-out;
        }
        .particle:nth-child(1) { left: 10%; top: 20%; animation-delay: 0s; animation-duration: 7s; }
        .particle:nth-child(2) { left: 30%; top: 60%; animation-delay: 1s; animation-duration: 9s; }
        .particle:nth-child(3) { left: 50%; top: 30%; animation-delay: 2s; animation-duration: 6s; }
        .particle:nth-child(4) { left: 70%; top: 70%; animation-delay: 3s; animation-duration: 8s; }
        .particle:nth-child(5) { left: 85%; top: 15%; animation-delay: 4s; animation-duration: 10s; }
        .particle:nth-child(6) { left: 20%; top: 85%; animation-delay: 1.5s; animation-duration: 7.5s; }
        @keyframes float {
            0%, 100% { transform: translateY(0) translateX(0); opacity: 0.3; }
            25% { transform: translateY(-30px) translateX(10px); opacity: 0.8; }
            50% { transform: translateY(-15px) translateX(-10px); opacity: 0.5; }
            75% { transform: translateY(-40px) translateX(5px); opacity: 0.7; }
        }
    </style>
</head>
<body>
<div class="login-page">
    <div class="particles">
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
    </div>
    <div class="train-track"></div>
    <div class="train-animation">
        <div class="train-head"></div>
        <div class="train-body"></div>
        <div class="train-wheel"></div>
        <div class="train-wheel"></div>
        <div class="train-wheel"></div>
        <div class="train-wheel"></div>
    </div>

    <div class="login-card">
        <div class="login-logo">
            <div class="icon">
                <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
                    <rect x="4" y="3" width="16" height="18" rx="2"/>
                    <line x1="4" y1="9" x2="20" y2="9"/>
                    <line x1="4" y1="15" x2="20" y2="15"/>
                    <line x1="10" y1="3" x2="10" y2="9"/>
                </svg>
            </div>
            <h1>Ticketeer</h1>
            <p>Espace Controleur</p>
        </div>

        <div th:if="${errorMessage}" class="alert alert-error">
            <span th:text="${errorMessage}"></span>
        </div>
        <div th:if="${logoutMessage}" class="alert alert-success">
            <span th:text="${logoutMessage}"></span>
        </div>

        <form th:action="@{/controleur/login}" method="post">
            <div class="form-group">
                <label for="login">Identifiant</label>
                <input type="text" id="login" name="login" placeholder="Entrez votre identifiant" required autofocus>
            </div>
            <div class="form-group">
                <label for="password">Mot de passe</label>
                <input type="password" id="password" name="password" placeholder="Entrez votre mot de passe" required>
            </div>
            <button type="submit" class="btn-login">Se connecter</button>
        </form>
    </div>
</div>
</body>
</html>
